apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-upgrades
  namespace: flux-system
spec:
  dependsOn:
    - name: prod-infra
  interval: 10m
  path: ./infrastructure/upgrade/tuppr/upgrades
  prune: true
  wait: true
  timeout: 10m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: platform-repo
