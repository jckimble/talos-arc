apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-workloads
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/prod/workloads
  prune: true
  wait: true
  timeout: 10m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: platform-repo
  decryption:
    provider: sops
    secretRef:
      name: sops-age
