apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: cluster
  namespace: system-upgrade
spec:
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.12.6
  policy:
    debug: false
    force: false
    rebootMode: default
    placement: soft
    stage: false
    timeout: 30m
  drain:
    deleteLocalData: true
    ignoreDaemonSets: true
    force: true
  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.filter(c, c.type == 'Ready').all(c, c.status == 'True')
      timeout: 10m
  maintenance:
    windows:
      - start: 0 2 * * 0
        duration: 4h
        timezone: UTC
