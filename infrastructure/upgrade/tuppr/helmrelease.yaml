apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
  namespace: system-upgrade
spec:
  interval: 1h
  releaseName: tuppr
  chart:
    spec:
      chart: tuppr
      version: 0.1.x
      sourceRef:
        kind: HelmRepository
        name: tuppr
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  values:
    replicaCount: 1
    priorityClassName: ops-standard
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
